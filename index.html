<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#fdf0f5,#f8d7e3);
color:#333;
overflow-x:hidden;
}

/* ===== HEADER ===== */
header{
position:relative;
height:80vh;
overflow:hidden;
}

/* ===== CARROSSEL ===== */
.carousel{
position:absolute;
width:300%;
height:100%;
display:flex;
animation:slide 18s infinite;
}

.carousel img{
width:100%;
height:80vh;
object-fit:cover;
filter:brightness(70%);
}

@keyframes slide{
0%{transform:translateX(0);}
33%{transform:translateX(-100%);}
66%{transform:translateX(-200%);}
100%{transform:translateX(0);}
}

/* ===== TEXTO SOBRE CARROSSEL ===== */
.hero{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
backdrop-filter:blur(8px);
background:rgba(0,0,0,0.3);
padding:40px 60px;
border-radius:20px;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:48px;
letter-spacing:2px;
}

.hero p{
margin-top:15px;
font-weight:300;
font-size:18px;
}

/* ===== PRODUTOS ===== */
.section-title{
text-align:center;
margin:80px 0 40px;
font-family:'Playfair Display',serif;
font-size:32px;
color:#b76e79;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:40px;
padding:0 20px 80px;
}

.card{
width:300px;
border-radius:20px;
overflow:hidden;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(183,110,121,0.2);
transition:0.4s;
}

.card:hover{
transform:translateY(-15px);
box-shadow:0 20px 40px rgba(183,110,121,0.4);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card-content{
padding:25px;
text-align:center;
}

.card-content h3{
font-family:'Playfair Display',serif;
color:#b76e79;
font-size:22px;
margin-bottom:10px;
}

.price{
font-size:20px;
font-weight:600;
color:#8d4f5b;
margin-bottom:20px;
}

/* ===== BOTÃO ===== */
.whatsapp-btn{
display:inline-block;
padding:12px 28px;
border-radius:40px;
background:linear-gradient(45deg,#b76e79,#e6a4b4);
color:white;
text-decoration:none;
font-weight:500;
transition:0.3s;
}

.whatsapp-btn:hover{
transform:scale(1.07);
box-shadow:0 10px 25px rgba(183,110,121,0.5);
}

/* ===== FOOTER ===== */
footer{
background:#b76e79;
color:white;
text-align:center;
padding:25px;
font-size:14px;
}

</style>
</head>
